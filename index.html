<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Szerenád Matchmaker</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #2f2f35;
  color: #f2f2f2;
  margin: 0;
  padding: 24px;
}
.container {
  max-width: 800px;
  margin: auto;
  background: #4a4a50;
  padding: 28px;
  border-radius: 12px;
}
label { display: block; margin-top: 12px; }
input, select {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  border-radius: 6px;
}
button {
  margin-top: 12px;
  padding: 10px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
ul { margin-top: 10px; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRThDuC3vJyMhHluWcp39anmlgWcMJBy4",
  authDomain: "szerenad-3e281.firebaseapp.com",
  databaseURL: "https://szerenad-3e281-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "szerenad-3e281",
  storageBucket: "szerenad-3e281.firebasestorage.app",
  messagingSenderId: "746045136275",
  appId: "1:746045136275:web:e1720a6619cd05bf671c66"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const peopleRef = ref(db, "people");

let people = [];

/* 🔥 20 KÉRDÉS */
const questions = [
  ["Halogatni", "Túl lenni"],
  ["Ezüst", "Arany"],
  ["iPhone", "Android"],
  ["Korán", "Későn"],
  ["Introvertált", "Extrovertált"],
  ["1-2", "3-5", "6+"],
  ["Tervezel", "Improvizálsz"],
  ["Tél", "Tavasz", "Nyár", "Ősz"],
  ["Édes", "Sós"],
  ["Maradok", "Lelépek"],
  ["Késel", "Időben"],
  ["Magyar", "Külföldi"],
  ["Elegáns", "Laza"],
  ["0", "1-2", "3+"],
  ["0", "1-2", "3+"],

  /* 🔥 ÚJ 5 KÉRDÉS */
  ["Nyek", "9.", "10.", "11.", "12.", "13."],
  ["Instagram", "TikTok", "YouTube", "Facebook", "Egyiken sem"],
  ["Láthatatlanság", "Repülés", "Gondolatolvasás", "Idő megállítása", "Szupererő"],
  ["Miau", "Brumm", "Kukurikú", "Bip-bip", "Vau"],
  ["Őskor", "Ókor", "Középkor", "20. század", "Jövő"]
];

/* Kérdések kirajzolása */
function renderQuestions() {
  const container = document.getElementById("kerdesek");
  container.innerHTML = "";

  questions.forEach((q, i) => {
    const label = document.createElement("label");
    label.textContent = (i+1) + ". kérdés:";
    
    const select = document.createElement("select");
    select.id = "q" + (i+1);

    q.forEach(opt => {
      const option = document.createElement("option");
      option.value = opt;
      option.textContent = opt;
      select.appendChild(option);
    });

    container.appendChild(label);
    container.appendChild(select);
  });
}

/* Ember hozzáadás */
window.addPerson = function() {
  const name = document.getElementById("nev").value.trim();
  if (!name) return alert("Adj meg nevet!");

  const answers = [];
  for (let i = 1; i <= questions.length; i++) {
    answers.push(document.getElementById("q"+i).value);
  }

  push(peopleRef, { name, answers });
  document.getElementById("nev").value = "";
}

/* Lista */
onValue(peopleRef, snapshot => {
  const data = snapshot.val();
  people = [];

  if (data) {
    for (let key in data) {
      people.push({ ...data[key], id: key });
    }
  }

  renderList();
});

function renderList() {
  const list = document.getElementById("lista");
  list.innerHTML = "";

  people.forEach(p => {
    const li = document.createElement("li");

    const btn = document.createElement("button");
    btn.textContent = "❌";
    btn.onclick = () => remove(ref(db, "people/" + p.id));

    li.textContent = p.name + " ";
    li.appendChild(btn);

    list.appendChild(li);
  });
}

/* Párosítás */
window.matchPeople = function() {
  const out = document.getElementById("parok");
  out.innerHTML = "";

  if (people.length < 2) {
    out.innerHTML = "<li>Legalább 2 ember kell</li>";
    return;
  }

  let results = [];

  for (let i = 0; i < people.length; i++) {
    for (let j = i+1; j < people.length; j++) {
      let score = 0;

      for (let k = 0; k < people[i].answers.length; k++) {
        if (people[i].answers[k] === people[j].answers[k]) score++;
      }

      results.push({
        pair: people[i].name + " ❤️ " + people[j].name,
        score
      });
    }
  }

  results.sort((a,b)=>b.score-a.score);

  results.slice(0,5).forEach(r=>{
    const li = document.createElement("li");
    li.textContent = r.pair + " (" + r.score + ")";
    out.appendChild(li);
  });
}

/* Összes törlés */
window.clearAll = function() {
  remove(peopleRef);
}

renderQuestions();
</script>
</head>

<body>
<div class="container">
<h2>Szerenád Kérdőív 🍻</h2>

<label>Név:</label>
<input type="text" id="nev">

<div id="kerdesek"></div>

<button onclick="addPerson()">Hozzáadás</button>
<button onclick="matchPeople()">Párosítás</button>
<button onclick="clearAll()">Összes törlése</button>

<h3>Résztvevők:</h3>
<ul id="lista"></ul>

<h3>Legjobb párok:</h3>
<ul id="parok"></ul>

</div>
</body>
</html>
