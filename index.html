<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Szerenád Matchmaker</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBRThDuC3vJyMhHluWcp39anmlgWcMJBy4",
  authDomain: "szerenad-3e281.firebaseapp.com",
  databaseURL: "https://szerenad-3e281-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "szerenad-3e281",
  storageBucket: "szerenad-3e281.firebasestorage.app",
  messagingSenderId: "746045136275",
  appId: "1:746045136275:web:e1720a6619cd05bf671c66"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const peopleRef = ref(db, "people");

let people = [];

window.addPerson = function() {
  const name = document.getElementById("nev").value;
  const answers = [];

  for (let i = 1; i <= 15; i++) {
    answers.push(document.getElementById("q"+i).value);
  }

  push(peopleRef, { name, answers });
}

onValue(peopleRef, (snapshot) => {
  const data = snapshot.val();
  people = [];

  for (let key in data) {
    people.push(data[key]);
  }

  renderList();
});

function renderList() {
  const list = document.getElementById("lista");
  list.innerHTML = "";

  people.forEach(p => {
    const li = document.createElement("li");
    li.textContent = p.name;
    list.appendChild(li);
  });
}

window.matchPeople = function() {
  let results = [];

  for (let i = 0; i < people.length; i++) {
    for (let j = i + 1; j < people.length; j++) {
      let score = 0;

      for (let k = 0; k < people[i].answers.length; k++) {
        if (people[i].answers[k] === people[j].answers[k]) {
          score++;
        }
      }

      results.push({
        pair: people[i].name + " - " + people[j].name,
        score
      });
    }
  }

  results.sort((a, b) => b.score - a.score);

  const out = document.getElementById("parok");
  out.innerHTML = "";

  results.slice(0, 5).forEach(r => {
    const li = document.createElement("li");
    li.textContent = r.pair + " (" + r.score + " egyezés)";
    out.appendChild(li);
  });
}
</script>

</head>
<body>

<h2>Szerenád Kérdőív 🍻</h2>

<label>Név:</label><br>
<input type="text" id="nev"><br><br>

<div id="kerdesek">
  <script>
    const questions = [
      ["Halogatni", "Túl lenni"],
      ["Ezüst", "Arany"],
      ["iPhone", "Android"],
      ["Korán", "Későn"],
      ["Introvertált", "Extrovertált"],
      ["1-2", "3-5", "6+"],
      ["Tervezel", "Improvizálsz"],
      ["Tél", "Tavasz", "Nyár", "Ősz"],
      ["Édes", "Sós"],
      ["Maradok", "Lelépek"],
      ["Késel", "Időben"],
      ["Magyar", "Külföldi"],
      ["Elegáns", "Laza"],
      ["0", "1-2", "3+"],
      ["0", "1-2", "3+"]
    ];

    questions.forEach((q, i) => {
      document.write(`<label>${i+1}. kérdés:</label><br>`);
      document.write(`<select id="q${i+1}">`);
      q.forEach(opt => {
        document.write(`<option value="${opt}">${opt}</option>`);
      });
      document.write(`</select><br><br>`);
    });
  </script>
</div>

<button onclick="addPerson()">Hozzáadás</button>
<button onclick="matchPeople()">Párosítás</button>

<h3>Résztvevők:</h3>
<ul id="lista"></ul>

<h3>Legjobb párok:</h3>
<ul id="parok"></ul>

</body>
</html>
